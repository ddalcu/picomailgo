services:
  gogomail:
    build: .
    ports:
      - "25:25"
      - "80:80"
      - "443:443"
      - "587:587"
      - "993:993"
    volumes:
      - mail-data:/data
    environment:
      GOGOMAIL_HOSTNAME: mail.example.com
      GOGOMAIL_DATA_DIR: /data
      GOGOMAIL_WEB_LISTEN: ":443"
      GOGOMAIL_HTTP_LISTEN: ":80"
      GOGOMAIL_SMTP_INBOUND_LISTEN: ":25"
      GOGOMAIL_SMTP_SUBMISSION_LISTEN: ":587"
      GOGOMAIL_IMAP_LISTEN: ":993"
      GOGOMAIL_TLS_MODE: "none"
      GOGOMAIL_JWT_SECRET: "change-me-to-a-random-secret"
    restart: unless-stopped

volumes:
  mail-data:
