services:
  picomailgo:
    build: .
    ports:
      - "25:25"
      - "80:80"
      - "443:443"
      - "587:587"
      - "993:993"
    volumes:
      - mail-data:/data
    environment:
      MAIL_DOMAIN: mail.example.com
      DATA_DIR: /data
      WEB_LISTEN: ":443"
      HTTP_LISTEN: ":80"
      SMTP_INBOUND_LISTEN: ":25"
      SMTP_SUBMISSION_LISTEN: ":587"
      IMAP_LISTEN: ":993"
      TLS_MODE: "none"
      JWT_SECRET: "change-me-to-a-random-secret"
    restart: unless-stopped

volumes:
  mail-data:
