{{template "layout.html" .}}
{{define "body"}}
<div class="auth-page">
    <div class="auth-card">
        <h1>PicoMailGo</h1>
        <p class="auth-subtitle">Create your account</p>
        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Sign In</a></p>
    </div>
</div>
{{end}}
