{{template "layout.html" .}}
{{define "body"}}
<div class="app-layout">
    {{template "partials/sidebar.html" .}}
    <div class="main-content">
        <div class="toolbar">
            <h1>Compose</h1>
        </div>
        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}
        {{if .Success}}
        <div class="alert alert-success">{{.Success}}</div>
        {{end}}
        <form method="POST" action="/compose" enctype="multipart/form-data">
            <div class="form-group">
                <label for="from">From</label>
                <input type="text" id="from" class="form-control" value="{{.From}}" disabled>
            </div>
            <div class="form-group">
                <label for="to">To</label>
                <input type="email" id="to" name="to" class="form-control" required value="{{.To}}">
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" class="form-control" value="{{.Subject}}">
            </div>
            <div class="form-group">
                <label for="body">Message</label>
                <textarea id="body" name="body" class="form-control">{{.Body}}</textarea>
            </div>
            <div class="form-group">
                <label for="attachments">Attachments</label>
                <input type="file" id="attachments" name="attachments" class="form-control" multiple>
            </div>
            <button type="submit" class="btn btn-primary">Send</button>
            <a href="/mailbox/INBOX" class="btn btn-outline">Cancel</a>
        </form>
    </div>
</div>
{{end}}
