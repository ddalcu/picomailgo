{{template "layout.html" .}}
{{define "body"}}
<div class="app-layout app-layout--two-col">
    {{template "partials/sidebar.html" .}}
    <div class="main-content">
        <div class="toolbar">
            <button class="hamburger" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18"/><path d="M3 6h18"/><path d="M3 18h18"/></svg>
            </button>
            <h1>Compose</h1>
        </div>
        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{end}}
        {{if .Success}}
        <div class="alert alert-success">{{.Success}}</div>
        {{end}}
        <form method="POST" action="/compose" enctype="multipart/form-data">
            <div class="form-group">
                <label for="from">From</label>
                <input type="text" id="from" class="form-control" value="{{.From}}" disabled>
            </div>
            <div class="form-group">
                <label for="to">To</label>
                <input type="email" id="to" name="to" class="form-control" placeholder="recipient@example.com" required value="{{.To}}">
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" class="form-control" placeholder="Message subject" value="{{.Subject}}">
            </div>
            <div class="form-group">
                <label for="body">Message</label>
                <textarea id="body" name="body" class="form-control" placeholder="Write your message...">{{.Body}}</textarea>
            </div>
            <div class="form-group">
                <label for="attachments">Attachments</label>
                <input type="file" id="attachments" name="attachments" class="form-control" multiple>
            </div>
            <div class="message-actions">
                <button type="submit" class="btn btn-primary">Send</button>
                <a href="/mailbox/INBOX" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{{end}}
